<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Earthkeeper</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#122D1C">
<link rel="apple-touch-icon" href="Earthkeeper.png">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{
  --forest:#0D2416;
  --forest-m:#122D1C;
  --gold:#C9A84C;
  --gold-l:#E8D5A0;
  --gold-d:#A87C28;
  --gold-glow:rgba(201,168,76,.18);
  --bd:rgba(201,168,76,.18);
  --ink:#E8D5A0;
  --ink-d:#F5EDD8;
  --soft:rgba(232,213,160,.55);
  --soft-d:rgba(232,213,160,.35);
  --input-bg:rgba(13,36,22,.5);
  --hover:rgba(201,168,76,.08);
  --sel:rgba(201,168,76,.12);
  --red:#E07050;--blue:#5B9BD5;--violet:#9B78C8;--teal:#3DBFA8;
  --omega:#9B5ED4;--jewel:#E07050;--mg:#4A85C9;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Jost',sans-serif;background:var(--forest);color:var(--ink);height:100vh;display:flex;flex-direction:column;overflow:hidden;-webkit-tap-highlight-color:transparent}

.leaflet-tile-pane{filter:brightness(1.8)}

#login-screen{position:fixed;inset:0;background:var(--forest);display:flex;align-items:center;justify-content:center;z-index:9999;background-image:radial-gradient(ellipse at 50% 60%,rgba(201,168,76,.06) 0%,transparent 70%)}
.login-box{background:rgba(18,45,28,.95);border:1px solid var(--bd);border-radius:10px;padding:44px 48px;width:360px;text-align:center;box-shadow:0 8px 48px rgba(0,0,0,.5)}
.login-seal{width:130px;height:130px;border-radius:50%;overflow:hidden;border:2.5px solid var(--gold);margin:0 auto 20px;display:block;background:#0D2416}
.login-seal img{width:100%;height:100%;object-fit:cover;border-radius:50%;display:block}
.login-logo{font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:300;letter-spacing:.14em;color:var(--gold-l);margin-bottom:4px}
.login-logo em{color:var(--gold);font-style:italic}
.login-sub{font-size:12px;color:var(--soft);letter-spacing:.15em;text-transform:uppercase;margin-bottom:32px}
.login-field{margin-bottom:14px;text-align:left}
.login-field label{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--soft);display:block;margin-bottom:6px}
.login-field input{width:100%;padding:11px 14px;border:1px solid var(--bd);border-radius:5px;font-family:'Jost',sans-serif;font-size:15px;background:var(--input-bg);outline:none;color:var(--ink-d);caret-color:var(--gold)}
.login-field input::placeholder{color:var(--soft-d)}
.login-field input:focus{border-color:var(--gold)}
.login-btn{width:100%;padding:13px;background:var(--gold-d);color:var(--forest);border:none;border-radius:5px;font-family:'Jost',sans-serif;font-size:13px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;margin-top:10px;transition:background .2s;font-weight:500}
.login-btn:hover{background:var(--gold)}
.login-err{font-size:12px;color:var(--jewel);margin-top:12px;min-height:18px}

#app{display:none;flex-direction:column;height:100vh}
header{background:var(--forest-m);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:64px;flex-shrink:0;gap:16px;border-bottom:1px solid var(--bd)}
.header-brand{display:flex;align-items:center;gap:12px}
.header-seal{width:40px;height:40px;border-radius:50%;overflow:hidden;border:2px solid var(--gold);flex-shrink:0;background:#0D2416}
.header-seal img{width:100%;height:100%;object-fit:cover;border-radius:50%;display:block}
.logo{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;letter-spacing:.1em;color:var(--gold-l)}
.logo em{color:var(--gold);font-style:italic}
.huser{font-size:14px;color:var(--soft);display:flex;align-items:center;gap:12px}
.huser strong{color:var(--gold-l);font-size:15px}
.huser button{background:none;border:1px solid var(--bd);color:var(--soft);padding:5px 12px;font-family:'Jost',sans-serif;font-size:12px;cursor:pointer;border-radius:4px;transition:all .15s}
.huser button:hover{border-color:var(--gold);color:var(--gold-l)}
.hstats{display:flex;gap:24px;font-size:13px;letter-spacing:.06em;color:var(--soft);text-transform:uppercase}
.hstats strong{color:var(--gold);font-size:20px;display:block;letter-spacing:0}
.hbtn{background:none;border:1px solid var(--bd);color:var(--gold-l);padding:7px 16px;font-family:'Jost',sans-serif;font-size:13px;letter-spacing:.06em;cursor:pointer;border-radius:4px;text-transform:uppercase;transition:all .2s}
.hbtn:hover{background:var(--gold-glow);border-color:var(--gold)}

.body{display:flex;flex:1;overflow:hidden}
.sidebar{width:33.333%;flex-shrink:0;background:rgba(18,45,28,.55);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden;transition:width .3s,opacity .3s}
.sidebar.collapsed{width:0;opacity:0;pointer-events:none}

.tabs{display:flex;border-bottom:1px solid var(--bd);flex-shrink:0;background:rgba(18,45,28,.75)}
.tab{flex:1;padding:16px 8px;font-family:'Jost',sans-serif;font-size:13px;text-transform:uppercase;letter-spacing:.1em;background:none;border:none;cursor:pointer;color:var(--soft);transition:all .2s;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.on{color:var(--gold);font-weight:500;border-bottom-color:var(--gold)}
.panel{display:none;flex-direction:column;flex:1;overflow:hidden;min-height:0}
.panel.on{display:flex}

.frow{padding:14px 20px;border-bottom:1px solid var(--bd);flex-shrink:0;background:rgba(18,45,28,.18)}
.frow-label{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--soft);margin-bottom:9px;font-weight:500}
.chips{display:flex;gap:7px;flex-wrap:wrap}
.chip{display:flex;align-items:center;gap:5px;padding:6px 13px;border-radius:20px;font-size:13px;cursor:pointer;border:1.5px solid;transition:all .15s;font-family:'Jost',sans-serif;user-select:none;color:var(--soft)}
.chip-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.chip.hospital{border-color:var(--red);color:var(--red)}.chip.hospital.on{background:var(--red);color:#fff}
.chip.school{border-color:var(--blue);color:var(--blue)}.chip.school.on{background:var(--blue);color:#fff}
.chip.university{border-color:var(--violet);color:var(--violet)}.chip.university.on{background:var(--violet);color:#fff}
.chip.hospice{border-color:var(--teal);color:var(--teal)}.chip.hospice.on{background:var(--teal);color:#fff}
.chip.show-all{border-color:var(--soft);color:var(--soft)}.chip.show-all.on{background:rgba(232,213,160,.2);color:var(--gold-l);border-color:var(--gold)}
.chip.show-cleared{border-color:var(--gold-d);color:var(--gold)}.chip.show-cleared.on{background:var(--gold);color:var(--forest)}
.chip.show-omega{border-color:var(--omega);color:var(--omega)}.chip.show-omega.on{background:var(--omega);color:#fff}
.chip.show-jewel{border-color:var(--jewel);color:var(--jewel)}.chip.show-jewel.on{background:var(--jewel);color:#fff}
.chip.show-mg{border-color:var(--mg);color:var(--mg)}.chip.show-mg.on{background:var(--mg);color:#fff}

.rsel{padding:10px 20px;border-bottom:1px solid var(--bd);flex-shrink:0;background:rgba(18,45,28,.18)}
.rsel select{width:100%;padding:10px 12px;border:1px solid var(--bd);border-radius:6px;font-family:'Jost',sans-serif;font-size:15px;background:rgba(13,36,22,.3);outline:none;cursor:pointer;color:var(--ink);appearance:none;-webkit-appearance:none}
.rsel select option{background:#1A3D28;color:var(--ink-d)}

.srow{padding:10px 20px;border-bottom:1px solid var(--bd);flex-shrink:0;background:rgba(18,45,28,.18)}
.sinput{width:100%;padding:10px 13px;border:1.5px solid var(--bd);border-radius:6px;font-family:'Jost',sans-serif;font-size:15px;outline:none;background:rgba(13,36,22,.25);color:var(--ink-d);caret-color:var(--gold)}
.sinput::placeholder{color:var(--soft-d)}
.sinput:focus{border-color:var(--gold)}

.llist{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;min-height:0}
.llist::-webkit-scrollbar{width:3px}
.llist::-webkit-scrollbar-thumb{background:var(--bd)}
.litem{padding:12px 20px;cursor:pointer;border-bottom:1px solid var(--bd);transition:background .12s;display:flex;align-items:flex-start;gap:12px}
.litem:hover{background:var(--hover)}
.litem.sel{background:var(--sel);border-left:3px solid var(--gold);padding-left:17px}
.ldot{width:13px;height:13px;border-radius:50%;flex-shrink:0;margin-top:4px;border:2px solid transparent}
.linfo{flex:1;min-width:0}
.lname{font-size:16px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink-d)}
.litem.done .lname{text-decoration:line-through;opacity:.45}
.lmeta{font-size:13px;color:var(--soft);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lbadge{font-size:11px;padding:2px 9px;border-radius:10px;flex-shrink:0;align-self:center;border:1.5px solid;white-space:nowrap;font-weight:500}

.detail{flex-shrink:0;border-top:1px solid var(--bd);background:rgba(13,36,22,.88);display:none;flex-direction:column;max-height:50%}
.detail.on{display:flex}
.detail-head{padding:16px 20px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.detail-head-left{flex:1;min-width:0}
.detail-head-right{display:flex;flex-direction:row;align-items:center;gap:9px;flex-shrink:0}
.detail-close{background:none;border:none;font-size:22px;color:var(--soft);cursor:pointer;line-height:1;padding:0;transition:color .15s}
.detail-close:hover{color:var(--gold)}
.gmaps-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:6px;background:rgba(201,168,76,.1);border:1px solid var(--bd);text-decoration:none;cursor:pointer;transition:all .15s;font-family:'Jost',sans-serif;font-size:12px;font-weight:500;color:var(--gold);white-space:nowrap}
.gmaps-btn:hover{background:rgba(201,168,76,.2);border-color:var(--gold)}
.gmaps-btn svg{width:14px;height:14px;flex-shrink:0}
.detail-type{font-size:11px;text-transform:uppercase;letter-spacing:.12em;font-weight:500;margin-bottom:4px}
.detail-type.hospital{color:var(--red)}.detail-type.school{color:var(--blue)}.detail-type.university{color:var(--violet)}.detail-type.hospice{color:var(--teal)}
.detail-name{font-family:'Cormorant Garamond',serif;font-size:24px;line-height:1.3;color:var(--gold-l)}
.detail-addr{font-size:13px;color:var(--soft);margin-top:3px}
.detail-body{padding:12px 20px 18px;overflow-y:auto}
.detail-cleared{font-size:14px;padding:10px 13px;border-radius:6px;margin-bottom:11px;line-height:1.5}
.tool-label{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--soft);margin-bottom:8px}
.tool-btns{display:flex;gap:9px;margin-bottom:11px}
.tool-btn{flex:1;padding:11px 6px;border:1.5px solid;border-radius:6px;font-family:'Jost',sans-serif;font-size:14px;cursor:pointer;background:none;transition:all .15s;letter-spacing:.04em;font-weight:500}
.tool-btn.omega{border-color:var(--omega);color:var(--omega)}.tool-btn.omega.sel{background:var(--omega);color:#fff}
.tool-btn.jewel{border-color:var(--jewel);color:var(--jewel)}.tool-btn.jewel.sel{background:var(--jewel);color:#fff}
.tool-btn.mg{border-color:var(--mg);color:var(--mg)}.tool-btn.mg.sel{background:var(--mg);color:#fff}
.btn-mark{display:block;width:100%;padding:13px;background:var(--gold-d);color:var(--forest);border:none;border-radius:6px;font-family:'Jost',sans-serif;font-size:14px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:background .2s;font-weight:500}
.btn-mark:hover{background:var(--gold)}
.btn-unmark{display:block;width:100%;padding:10px;margin-top:9px;background:none;border:1.5px solid var(--bd);border-radius:6px;font-family:'Jost',sans-serif;font-size:13px;color:var(--soft);cursor:pointer;text-transform:uppercase;letter-spacing:.06em;transition:all .15s}
.btn-unmark:hover{border-color:var(--jewel);color:var(--jewel)}

.log-filter{padding:10px 20px;border-bottom:1px solid var(--bd);flex-shrink:0;display:flex;gap:9px;align-items:center;background:rgba(18,45,28,.18)}
.log-filter label{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--soft);white-space:nowrap}
.log-date-input{flex:1;padding:6px 9px;border:1px solid var(--bd);border-radius:5px;font-family:'Jost',sans-serif;font-size:13px;outline:none;background:rgba(13,36,22,.3);color:var(--ink)}
.log-date-input:focus{border-color:var(--gold)}
.log-clear-btn{background:none;border:1px solid var(--bd);border-radius:5px;padding:5px 9px;font-family:'Jost',sans-serif;font-size:12px;color:var(--soft);cursor:pointer;transition:all .15s}
.log-clear-btn:hover{border-color:var(--jewel);color:var(--jewel)}

#map{flex:1}
.mwrap{position:relative;flex:1;display:flex;flex-direction:column}
.mload{position:absolute;inset:0;background:rgba(13,36,22,.5);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:500;gap:18px}
.dots{display:flex;gap:8px}
.dots span{width:9px;height:9px;border-radius:50%;background:var(--gold);animation:pulse 1.2s ease-in-out infinite}
.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,100%{opacity:.25;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
.msub{font-size:14px;color:var(--soft);text-align:center;max-width:300px}
.tog{position:absolute;top:50%;left:0;transform:translateY(-50%);z-index:1000;background:rgba(13,36,22,.7);border:1px solid var(--bd);border-left:none;border-radius:0 6px 6px 0;width:22px;height:52px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:12px;transition:background .15s}
.tog:hover{background:rgba(18,45,28,.9)}

.map-overlays{position:absolute;top:14px;right:14px;z-index:400;display:flex;flex-direction:column;gap:9px;align-items:flex-end}
.progress{background:rgba(13,36,22,.65);backdrop-filter:blur(10px);border:1px solid var(--bd);border-radius:8px;padding:13px 18px;min-width:210px}
.prog-title{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--soft);margin-bottom:9px}
.prog-row{display:flex;align-items:center;gap:9px;margin-bottom:7px}
.prog-label{font-size:13px;width:74px;flex-shrink:0;color:var(--ink)}
.prog-track{flex:1;height:4px;background:rgba(201,168,76,.12);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .4s}
.prog-count{font-size:12px;color:var(--soft);min-width:34px;text-align:right}
.legend{background:rgba(13,36,22,.65);backdrop-filter:blur(10px);border:1px solid var(--bd);border-radius:8px;padding:12px 16px}
.leg-title{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--soft);margin-bottom:8px}
.leg-item{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:13px;color:var(--ink)}
.leg-dot{width:12px;height:12px;border-radius:50%}

.locate-btn{position:absolute;bottom:22px;left:14px;z-index:410;background:rgba(13,36,22,.7);backdrop-filter:blur(8px);border:1px solid var(--bd);border-radius:8px;padding:8px 13px;display:inline-flex;align-items:center;gap:6px;cursor:pointer;font-family:'Jost',sans-serif;font-size:13px;font-weight:500;color:var(--gold-l);transition:all .15s}
.locate-btn:hover{background:rgba(18,45,28,.92);border-color:var(--gold)}
.locate-btn span{font-size:17px;line-height:1}

.empty{padding:26px;text-align:center;font-size:14px;color:var(--soft);line-height:1.8}
.saving{position:fixed;bottom:22px;right:22px;background:rgba(13,36,22,.95);border:1px solid var(--bd);color:var(--gold-l);padding:10px 16px;border-radius:6px;font-size:13px;z-index:9999;transition:opacity .4s;pointer-events:none}
#mobile-detail{display:none}

@media(max-width:700px){
  .leaflet-control-zoom{display:none!important}
  header{height:48px;padding:0 12px}
  .header-seal{width:32px;height:32px}
  .logo{font-size:18px}
  .hstats{display:none}
  .huser strong{font-size:11px}
  .hbtn{font-size:10px;padding:4px 9px}
  #app{flex-direction:column}
  .body{flex-direction:column;flex:1;overflow:hidden}
  .mwrap{flex:1;min-height:0;position:relative}
  .sidebar{width:100%!important;opacity:1!important;flex-shrink:0;border-right:none;border-top:1px solid var(--bd);height:auto;overflow:visible;background:rgba(13,36,22,.7)}
  .sidebar.collapsed{height:40px;overflow:hidden}
  .llist{display:none!important;flex:none!important}
  .llist.active{display:block!important;max-height:40vh;overflow-y:auto!important}
  .sidebar .detail{display:none!important}
  .tabs{background:rgba(18,45,28,.75)}
  .tab{color:var(--soft-d);font-size:10px;padding:10px 4px;border-bottom-color:transparent;border-bottom-width:2px;margin-bottom:-1px}
  .tab.on{color:var(--gold);border-bottom-color:var(--gold);font-size:11px}
  .frow{padding:6px 11px}
  .frow-label{font-size:9px;margin-bottom:4px}
  .chip{font-size:10px;padding:3px 8px;border-width:1px;gap:3px}
  .chip-dot{width:5px;height:5px}
  .rsel{padding:4px 11px}
  .rsel select{font-size:12px;padding:5px 9px}
  .srow{padding:4px 11px}
  .sinput{font-size:12px;padding:6px 9px;border-width:1px}
  .log-filter{padding:6px 11px;gap:6px}
  .log-filter label{font-size:9px}
  .log-date-input{font-size:11px;padding:4px 7px}
  .log-clear-btn{font-size:10px;padding:4px 7px}
  .tog{display:none}
  .map-overlays{top:7px;right:7px;gap:5px}
  .progress{min-width:130px;padding:6px 10px}
  .prog-title{font-size:8px;margin-bottom:4px}
  .prog-row{gap:5px;margin-bottom:3px}
  .prog-label{font-size:9px;width:48px}
  .prog-track{height:3px}
  .prog-count{font-size:8px;min-width:26px}
  .legend{padding:5px 8px}
  .leg-title{font-size:8px;margin-bottom:3px}
  .leg-item{font-size:9px;gap:4px;margin-bottom:2px}
  .leg-dot{width:7px;height:7px}
  .locate-btn{position:fixed!important;bottom:11px;left:11px;z-index:820;padding:6px 10px;font-size:11px;gap:4px;transition:bottom .25s ease}
  .locate-btn span{font-size:15px}
  .saving{bottom:11px;right:11px;font-size:11px;padding:7px 11px}
  #mobile-detail{display:none;position:fixed;bottom:0;left:0;right:0;max-height:50vh;overflow-y:auto;border-radius:12px 12px 0 0;box-shadow:0 -4px 28px rgba(0,0,0,.5);z-index:810;background:rgba(13,36,22,.94);border-top:1px solid var(--bd);-webkit-overflow-scrolling:touch;flex-direction:column}
  #mobile-detail.on{display:flex}
  #mobile-detail .detail-head{padding:11px 13px 0}
  #mobile-detail .detail-head-right{gap:7px}
  #mobile-detail .detail-close{font-size:17px}
  #mobile-detail .gmaps-btn{font-size:11px;padding:5px 8px}
  #mobile-detail .gmaps-btn svg{width:12px;height:12px}
  #mobile-detail .detail-type{font-size:9px}
  #mobile-detail .detail-name{font-size:16px}
  #mobile-detail .detail-addr{font-size:11px}
  #mobile-detail .detail-body{padding:9px 13px 14px}
  #mobile-detail .detail-cleared{font-size:12px;padding:7px 10px;margin-bottom:7px}
  #mobile-detail .tool-label{font-size:10px;margin-bottom:5px}
  #mobile-detail .tool-btns{gap:6px;margin-bottom:7px}
  #mobile-detail .tool-btn{padding:8px 4px;font-size:12px;border-width:1.5px}
  #mobile-detail .btn-mark{padding:9px;font-size:12px}
  #mobile-detail .btn-unmark{padding:7px;font-size:11px;margin-top:6px}
}
</style>
</head>
<body>

<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
<symbol id="ek-seal" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="48" fill="#0F2818"/>
  <circle cx="50" cy="50" r="47" fill="none" stroke="#C9A84C" stroke-width="1.8"/>
</symbol>
</svg>

<div id="login-screen">
  <div class="login-box">
    <div class="login-seal">
      <img src="Earthkeeper.png" alt="Earthkeeper" onerror="this.style.display='none'">
    </div>
    <div class="login-logo">Earth<em>keeper</em></div>

<style>
@keyframes markerGlow{
  0%  {box-shadow:0 0 0 0   rgba(201,168,76,.9),0 2px 6px rgba(0,0,0,.35)}
  50% {box-shadow:0 0 0 14px rgba(201,168,76,0),0 2px 6px rgba(0,0,0,.35)}
  100%{box-shadow:0 0 0 0   rgba(201,168,76,0),0 2px 6px rgba(0,0,0,.35)}
}
.marker-selected div{animation:markerGlow .8s ease-out infinite!important;border-width:3px!important}
@keyframes clearedGlow{
  0%,100%{filter:drop-shadow(0 0 3px rgba(201,168,76,.7))}
  50%{filter:drop-shadow(0 0 8px rgba(201,168,76,1))}
}
</style>

<script>
const GITHUB_TOKEN  = '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'
const PASSWORD_HASH = '74e6fbb572af72246abf610d8e268ae53e6599972c571117503dc4537b982b69'
const REPO_OWNER='Londrovski', REPO_NAME='earthkeeper', DATA_BRANCH='main'
const API_BASE=`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/data`

let locations=[], progress={}, progressSha=null, markers={}, selectedId=null, map
let placesFilter={hospital:true,school:true,university:true,hospice:true}, showFilter='all', currentTool='omega', currentUser=null
let locationMarker=null, currentMobileLoc=null

const GH_HEADERS={Authorization:`token ${GITHUB_TOKEN}`,Accept:'application/vnd.github.v3+json'}
function toolColor(t){return t==='omega'?'#9B5ED4':t==='jewel'?'#E07050':t==='mg'?'#4A85C9':'#C9A84C'}
const TOOLS=['omega','jewel','mg'], TOOL_NAMES={omega:'Omega',jewel:'Jewel',mg:'MG'}

let saveQueued=false
function queueSave(){saveQueued=true}
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='hidden'&&saveQueued){saveProgress();saveQueued=false}})
window.addEventListener('pagehide',()=>{if(saveQueued)saveProgress()})

async function doLogin(e){
  e.preventDefault()
  const name=document.getElementById('login-name').value.trim(), pw=document.getElementById('login-pw').value, err=document.getElementById('login-err')
  if(!name){err.textContent='Please enter your name';return}
  if(!pw){err.textContent='Please enter the password';return}
  err.textContent='Checking…'
  const hash=await sha256(pw)
  if(hash!==PASSWORD_HASH){err.textContent='Incorrect password';document.getElementById('login-pw').value='';return}
  currentUser=name; sessionStorage.setItem('ek_user',name)
  document.getElementById('login-screen').style.display='none'
  document.getElementById('app').style.display='flex'
  document.getElementById('h-username').textContent=name
  err.textContent=''; bootApp()
}
async function sha256(str){const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('')}
function logout(){sessionStorage.removeItem('ek_user');currentUser=null;document.getElementById('login-name').value='';document.getElementById('login-pw').value='';document.getElementById('login-screen').style.display='flex';document.getElementById('app').style.display='none'}

function isMobile(){return window.innerWidth<=700}

function updateLocateBtnPosition(){
  if(!isMobile())return
  const btn=document.getElementById('locate-btn')
  const panel=document.getElementById('mobile-detail')
  const panelH=panel.classList.contains('on')?(panel.offsetHeight||0):0
  btn.style.bottom=(11+panelH+(panelH>0?10:0))+'px'
}

function panToVisible(lat,lng,zoom){
  if(!isMobile()){
    if(zoom) map.setView([lat,lng],zoom)
    else map.panTo([lat,lng])
    return
  }
  requestAnimationFrame(()=>{
    const panel=document.getElementById('mobile-detail')
    const detailH=panel.classList.contains('on')?(panel.offsetHeight||0):0
    const offset=Math.round(detailH/2)
    if(zoom) map.setView([lat,lng],zoom,{animate:false})
    else map.panTo([lat,lng],{animate:false})
    if(offset>0) map.panBy([0,offset],{animate:true,duration:0.3})
  })
}

function initMap(){
  map=L.map('map',{tap:false,zoomControl:true,preferCanvas:true}).setView([51.5,-0.1],10)
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
    attribution:'© OpenStreetMap contributors © CARTO',
    subdomains:'abcd',
    maxZoom:19
  }).addTo(map)
}

function typeColor(type){
  if(type==='hospital') return '#E07050'
  if(type==='school')   return '#5B9BD5'
  if(type==='hospice')  return '#3DBFA8'
  return '#9B78C8' /* university */
}

function makeIcon(type,cleared,tool,selected){
  const tc=toolColor(tool)
  const fill=cleared?'#C9A84C':typeColor(type), border=cleared?tc:'rgba(255,255,255,.45)', borderW=cleared?3:2
  const sz=isMobile()?18:22
  const sparkle=cleared?'animation:clearedGlow 1.8s ease-in-out infinite;':''
  return L.divIcon({
    html:`<div style="width:${sz}px;height:${sz}px;border-radius:50% 50% 50% 0;background:${fill};transform:rotate(-45deg);border:${borderW}px solid ${border};box-shadow:0 2px 8px rgba(0,0,0,.55);${sparkle}"></div>`,
    iconSize:[sz,sz],iconAnchor:[sz/2,sz],className:selected?'marker-selected':''
  })
}

function locVisible(loc){
  if(!placesFilter[loc.type])return false
  const p=progress[loc.id]
  if(showFilter==='all')return true
  if(showFilter==='cleared')return!!p
  if(showFilter==='omega')return p?.tool==='omega'
  if(showFilter==='jewel')return p?.tool==='jewel'
  if(showFilter==='mg')return p?.tool==='mg'
  return true
}

function renderMarkers(){
  Object.values(markers).forEach(m=>map.removeLayer(m));markers={}
  for(const loc of locations){
    if(!loc.lat||!loc.lng||!locVisible(loc))continue
    const p=progress[loc.id]
    const m=L.marker([loc.lat,loc.lng],{icon:makeIcon(loc.type,!!p,p?.tool,loc.id===selectedId)}).addTo(map)
    m.on('click',()=>selectLoc(loc.id)); markers[loc.id]=m
  }
}

function setSelectedMarker(id){
  if(selectedId&&markers[selectedId]){const old=locations.find(l=>l.id===selectedId);if(old){const p=progress[old.id];markers[selectedId].setIcon(makeIcon(old.type,!!p,p?.tool,false))}}
  if(id&&markers[id]){const loc=locations.find(l=>l.id===id);if(loc){const p=progress[loc.id];markers[id].setIcon(makeIcon(loc.type,!!p,p?.tool,true));markers[id].setZIndexOffset(1000)}}
}

function locateMe(){
  if(!navigator.geolocation){alert('Geolocation not supported');return}
  navigator.geolocation.getCurrentPosition(pos=>{
    const{latitude:lat,longitude:lng}=pos.coords
    if(locationMarker)map.removeLayer(locationMarker)
    locationMarker=L.marker([lat,lng],{
      icon:L.divIcon({html:`<div style="width:16px;height:16px;border-radius:50%;background:#C9A84C;border:3px solid #0F2818;box-shadow:0 0 0 3px rgba(201,168,76,.4)"></div>`,iconSize:[16,16],iconAnchor:[8,8],className:''}),
      zIndexOffset:2000
    }).addTo(map)
    panToVisible(lat,lng,14)
  },err=>{alert(err.code===1?'Location permission denied':'Could not get location')},{enableHighAccuracy:true,timeout:10000})
}

async function ghGet(path){
  const res=await fetch(`${API_BASE}/${path}`,{headers:GH_HEADERS})
  if(!res.ok) throw new Error(`GitHub ${res.status}`)
  const meta=await res.json()
  return JSON.parse(atob(meta.content.replace(/\n/g,'')))
}

async function ghGetOptional(path){
  try{ return await ghGet(path) }
  catch(e){ return [] }
}

async function loadRegion(region){
  if(!region)return
  closeMobileDetail(); closeDetail()
  setMsg(`Loading ${region}…`); document.getElementById('mload').style.display='flex'
  try{
    const [hospitals, schools, universities, hospices] = await Promise.all([
      ghGetOptional(`hospitals-${region}.json`),
      ghGetOptional(`schools-${region}.json`),
      ghGetOptional(`universities-${region}.json`),
      ghGetOptional(`hospices-${region}.json`)
    ])
    locations = [...hospitals, ...schools, ...universities, ...hospices]
    hideLoader(); renderMarkers(); renderList(); updateStats()
    const pts=locations.filter(l=>l.lat&&l.lng)
    if(pts.length){
      const lats=pts.map(l=>l.lat), lngs=pts.map(l=>l.lng)
      map.flyToBounds([[Math.min(...lats),Math.min(...lngs)],[Math.max(...lats),Math.max(...lngs)]],{padding:[40,40],maxZoom:12,duration:1})
    } else {
      setMsg(`No data for "${region}" yet`); setTimeout(hideLoader,3000)
    }
  }catch(e){
    setMsg(`Error loading ${region}`); setTimeout(hideLoader,3000); locations=[]; renderList()
  }
}

async function loadProgress(){
  try{
    const res=await fetch(`${API_BASE}/progress.json`,{headers:GH_HEADERS})
    if(res.ok){const meta=await res.json();progressSha=meta.sha;progress=JSON.parse(atob(meta.content.replace(/\n/g,'')))}
  }catch(e){progress={}}
}

async function saveProgress(){
  showSaving('Saving…')
  try{
    const body={message:`${currentUser||'user'} — ${new Date().toISOString().slice(0,10)}`,content:btoa(unescape(encodeURIComponent(JSON.stringify(progress,null,2)))),branch:DATA_BRANCH}
    if(progressSha)body.sha=progressSha
    const res=await fetch(`${API_BASE}/progress.json`,{method:'PUT',headers:{...GH_HEADERS,'Content-Type':'application/json'},body:JSON.stringify(body)})
    if(res.ok){progressSha=(await res.json()).content.sha;showSaving('✓ Saved')}
    else{const e=await res.json();showSaving('Save failed: '+e.message)}
  }catch(e){showSaving('Error saving')}
  setTimeout(()=>document.getElementById('saving').style.opacity='0',2500)
}
function showSaving(msg){const e=document.getElementById('saving');e.textContent=msg;e.style.opacity='1'}

function renderList(){
  const el=document.getElementById('llist')
  const q=document.getElementById('search').value.toLowerCase().trim()
  el.classList.toggle('active', !!q)
  if(!q){el.innerHTML='';return}
  const vis=locations.filter(l=>{
    if(!locVisible(l))return false
    return l.name.toLowerCase().includes(q)||(l.address||'').toLowerCase().includes(q)||(l.postcode||'').toLowerCase().includes(q)
  })
  if(!vis.length){el.innerHTML=`<div class="empty">No matches for "${q}"</div>`;return}
  el.innerHTML=vis.map(l=>{
    const p=progress[l.id]
    const dotBg=p?'#C9A84C':typeColor(l.type)
    const dotBorder=p?`border:2px solid ${toolColor(p.tool)}`:'border:2px solid transparent'
    const badge=p?`<div class="lbadge" style="color:${toolColor(p.tool)};border-color:${toolColor(p.tool)}66;background:${toolColor(p.tool)}14">${TOOL_NAMES[p.tool]||p.tool}</div>`:''
    return`<div class="litem ${p?'done':''} ${selectedId===l.id?'sel':''}" onclick="selectLoc('${l.id}')">
      <div class="ldot" style="background:${dotBg};${dotBorder}"></div>
      <div class="linfo"><div class="lname">${l.name}</div><div class="lmeta">${l.type} · ${l.address||l.postcode||''}</div></div>
      ${badge}
    </div>`
  }).join('')
}

function gmapsUrl(loc){
  const q=encodeURIComponent(loc.name+(loc.address?', '+loc.address:''))
  return `https://www.google.com/maps/search/?api=1&query=${q}`
}

function selectLoc(id){
  setSelectedMarker(id); selectedId=id
  const loc=locations.find(l=>l.id===id); if(!loc)return
  renderList()
  if(loc.lat&&loc.lng) panToVisible(loc.lat,loc.lng,null)
  if(isMobile()){
    document.getElementById('search').value=''
    renderList()
    renderMobileDetail(loc)
    if(document.getElementById('tab-log').classList.contains('on')){
      switchTab('locs',document.querySelectorAll('.tab')[0])
    }
  }else{
    renderDetail(loc)
  }
}

function renderDetail(loc){
  const p=progress[loc.id],cleared=!!p
  const typeEl=document.getElementById('d-type'); typeEl.textContent=loc.type; typeEl.className='detail-type '+loc.type
  document.getElementById('d-name').textContent=loc.name
  document.getElementById('d-addr').textContent=loc.address||loc.postcode||''
  document.getElementById('d-gmaps').href=gmapsUrl(loc)
  const body=document.getElementById('d-body')
  if(cleared){
    const d=new Date(p.date).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}),col=toolColor(p.tool),who=p.user?` · ${p.user}`:''
    body.innerHTML=`<div class="detail-cleared" style="background:${col}18;border:1px solid ${col}44;color:${col}">✦ Cleared with <strong>${TOOL_NAMES[p.tool]||p.tool}</strong> · ${d}${who}</div><button class="btn-unmark" onclick="unmarkCleared('${loc.id}')">↩ Mark as not cleared</button>`
  }else{
    const toolBtns=TOOLS.map(t=>`<button class="tool-btn ${t} ${currentTool===t?'sel':''}" id="tbtn-${t}" onclick="selectTool('${t}')">${TOOL_NAMES[t]}</button>`).join('')
    body.innerHTML=`<div class="tool-label">Energy tool</div><div class="tool-btns">${toolBtns}</div><button class="btn-mark" id="btn-mark-confirm" onclick="markCleared('${loc.id}')">Mark cleared with ${TOOL_NAMES[currentTool]} ✦</button>`
  }
  document.getElementById('detail').classList.add('on')
}
function closeDetail(){
  if(selectedId&&!isMobile()){setSelectedMarker(null);selectedId=null}
  document.getElementById('detail').classList.remove('on'); renderList()
}

function renderMobileDetail(loc){
  currentMobileLoc=loc
  const p=progress[loc.id],cleared=!!p
  const typeEl=document.getElementById('md-type'); typeEl.textContent=loc.type; typeEl.className='detail-type '+loc.type
  document.getElementById('md-name').textContent=loc.name
  document.getElementById('md-addr').textContent=loc.address||loc.postcode||''
  document.getElementById('md-gmaps').href=gmapsUrl(loc)
  const body=document.getElementById('md-body')
  if(cleared){
    const d=new Date(p.date).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}),col=toolColor(p.tool),who=p.user?` · ${p.user}`:''
    body.innerHTML=`<div class="detail-cleared" style="background:${col}18;border:1px solid ${col}44;color:${col}">✦ Cleared with <strong>${TOOL_NAMES[p.tool]||p.tool}</strong> · ${d}${who}</div><button class="btn-unmark" onclick="unmarkClearedMobile('${loc.id}')">↩ Mark as not cleared</button>`
  }else{
    const toolBtns=TOOLS.map(t=>`<button class="tool-btn ${t} ${currentTool===t?'sel':''}" id="md-tbtn-${t}" onclick="selectToolMobile('${t}')">${TOOL_NAMES[t]}</button>`).join('')
    body.innerHTML=`<div class="tool-label">Energy tool</div><div class="tool-btns">${toolBtns}</div><button class="btn-mark" id="md-btn-mark" onclick="markClearedMobile('${loc.id}')">Mark cleared with ${TOOL_NAMES[currentTool]} ✦</button>`
  }
  const panel=document.getElementById('mobile-detail')
  panel.classList.add('on')
  requestAnimationFrame(()=>{
    const detailH=panel.offsetHeight||0
    if(detailH>0&&loc.lat&&loc.lng){
      map.panTo([loc.lat,loc.lng],{animate:false})
      map.panBy([0,Math.round(detailH/2)],{animate:true,duration:0.25})
    }
    updateLocateBtnPosition()
  })
}

function closeMobileDetail(){
  if(selectedId){setSelectedMarker(null);selectedId=null}
  document.getElementById('mobile-detail').classList.remove('on')
  currentMobileLoc=null; renderList(); updateLocateBtnPosition()
}

function selectToolMobile(tool){
  currentTool=tool
  TOOLS.forEach(t=>document.getElementById(`md-tbtn-${t}`)?.classList.toggle('sel',t===tool))
  const btn=document.getElementById('md-btn-mark'); if(btn)btn.textContent=`Mark cleared with ${TOOL_NAMES[tool]} ✦`
}
async function markClearedMobile(id){
  const loc=locations.find(l=>l.id===id); if(!loc)return
  progress[id]={tool:currentTool,date:new Date().toISOString().slice(0,10),user:currentUser}
  if(markers[id])markers[id].setIcon(makeIcon(loc.type,true,currentTool,true))
  renderMobileDetail(loc); renderList(); updateStats(); renderLog()
  await saveProgress(); queueSave()
}
async function unmarkClearedMobile(id){
  const loc=locations.find(l=>l.id===id); if(!loc)return
  delete progress[id]
  if(markers[id])markers[id].setIcon(makeIcon(loc.type,false,null,id===selectedId))
  renderMobileDetail(loc); renderList(); updateStats(); renderLog()
  await saveProgress(); queueSave()
}

function selectTool(tool){
  currentTool=tool; TOOLS.forEach(t=>document.getElementById(`tbtn-${t}`)?.classList.toggle('sel',t===tool))
  const btn=document.getElementById('btn-mark-confirm'); if(btn)btn.textContent=`Mark cleared with ${TOOL_NAMES[tool]} ✦`
}
async function markCleared(id){
  const loc=locations.find(l=>l.id===id); if(!loc)return
  progress[id]={tool:currentTool,date:new Date().toISOString().slice(0,10),user:currentUser}
  if(markers[id])markers[id].setIcon(makeIcon(loc.type,true,currentTool,true))
  renderDetail(loc); renderList(); updateStats(); renderLog()
  await saveProgress(); queueSave()
}
async function unmarkCleared(id){
  const loc=locations.find(l=>l.id===id); if(!loc)return
  delete progress[id]
  if(markers[id])markers[id].setIcon(makeIcon(loc.type,false,null,id===selectedId))
  renderDetail(loc); renderList(); updateStats(); renderLog()
  await saveProgress(); queueSave()
}

function clearLogFilter(){
  document.getElementById('log-from').value=''
  document.getElementById('log-to').value=''
  renderLog()
}

function renderLog(){
  const el=document.getElementById('log-list')
  const fromVal=document.getElementById('log-from')?.value||''
  const toVal=document.getElementById('log-to')?.value||''
  let entries=Object.entries(progress)
    .map(([id,p])=>{const l=locations.find(x=>x.id===id);return{id,...p,name:l?.name||id,type:l?.type||''}})
    .sort((a,b)=>b.date.localeCompare(a.date))
  if(fromVal) entries=entries.filter(e=>e.date>=fromVal)
  if(toVal)   entries=entries.filter(e=>e.date<=toVal)
  if(!entries.length){el.innerHTML=`<div class="empty">${fromVal||toVal?'No clearings in that date range':'No clearings yet'}</div>`;return}
  el.innerHTML=entries.map(e=>{
    const col=toolColor(e.tool),d=new Date(e.date).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}),who=e.user?`<span style="color:var(--gold)">${e.user}</span> · `:''
    return`<div style="padding:13px 20px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .12s" onmouseover="this.style.background='var(--hover)'" onmouseout="this.style.background=''" onclick="openFromLog('${e.id}')">
      <div style="display:flex;align-items:center;gap:9px;margin-bottom:3px">
        <div style="width:10px;height:10px;border-radius:50%;background:var(--gold);border:2px solid ${col};flex-shrink:0"></div>
        <span style="font-size:15px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--ink-d)">${e.name}</span>
      </div>
      <div style="font-size:12px;color:var(--soft);padding-left:19px">${who}${d} · ${TOOL_NAMES[e.tool]||e.tool} · ${e.type}</div>
    </div>`
  }).join('')
}

function openFromLog(id){
  switchTab('locs',document.querySelectorAll('.tab')[0])
  const loc=locations.find(l=>l.id===id)
  if(loc){selectLoc(id);return}
  const p=progress[id]; if(!p)return
  const col=toolColor(p.tool),d=new Date(p.date).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}),who=p.user?` · ${p.user}`:''
  const fallbackHtml=`<div class="detail-cleared" style="background:${col}18;border:1px solid ${col}44;color:${col}">✦ Cleared with <strong>${TOOL_NAMES[p.tool]||p.tool}</strong> · ${d}${who}</div><button class="btn-unmark" onclick="${isMobile()?'unmarkClearedMobile':'unmarkCleared'}('${id}')">↩ Mark as not cleared</button>`
  const gUrl=`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.name||id)}`
  if(isMobile()){
    document.getElementById('md-type').textContent=''; document.getElementById('md-type').className='detail-type'
    document.getElementById('md-name').textContent=p.name||id
    document.getElementById('md-addr').textContent='Load the region to see full details'
    document.getElementById('md-gmaps').href=gUrl
    document.getElementById('md-body').innerHTML=fallbackHtml
    document.getElementById('mobile-detail').classList.add('on')
    updateLocateBtnPosition()
  }else{
    document.getElementById('d-type').textContent=''; document.getElementById('d-type').className='detail-type'
    document.getElementById('d-name').textContent=p.name||id
    document.getElementById('d-addr').textContent='Load the region to see full details'
    document.getElementById('d-gmaps').href=gUrl
    document.getElementById('d-body').innerHTML=fallbackHtml
    document.getElementById('detail').classList.add('on')
  }
}

function updateStats(){
  const total=locations.length,cleared=Object.keys(progress).filter(id=>locations.find(l=>l.id===id)).length,pct=total?Math.round(cleared/total*100):0
  document.getElementById('s-total').textContent=total.toLocaleString(); document.getElementById('s-cleared').textContent=cleared; document.getElementById('s-pct').textContent=pct+'%'
  for(const[type,pgId,pgTxt]of[['hospital','pg-h','pg-ht'],['hospice','pg-ho','pg-hot'],['school','pg-s','pg-st'],['university','pg-u','pg-ut']]){
    const tot=locations.filter(l=>l.type===type).length,cl=locations.filter(l=>l.type===type&&progress[l.id]).length
    document.getElementById(pgId).style.width=(tot?Math.round(cl/tot*100):0)+'%'; document.getElementById(pgTxt).textContent=tot?`${cl}/${tot}`:'—'
  }
}

function togglePlace(type,el){placesFilter[type]=!placesFilter[type];el.classList.toggle('on',placesFilter[type]);renderMarkers();renderList()}
function setShow(mode,el){showFilter=mode;document.querySelectorAll('.chip.show-all,.chip.show-cleared,.chip.show-omega,.chip.show-jewel,.chip.show-mg').forEach(c=>c.classList.remove('on'));el.classList.add('on');renderMarkers();renderList()}

let sbOpen=true
function toggleSidebar(){sbOpen=!sbOpen;document.getElementById('sidebar').classList.toggle('collapsed',!sbOpen);document.getElementById('tog').textContent=sbOpen?'‹':'›'}
function switchTab(name,btn){document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));btn.classList.add('on');document.getElementById('tab-'+name).classList.add('on')}

function setMsg(m){document.getElementById('mload-msg').textContent=m}
function hideLoader(){document.getElementById('mload').style.display='none'}

async function bootApp(){
  initMap(); setMsg('Loading progress…'); await loadProgress()
  document.getElementById('region-select').value='london'
  await loadRegion('london'); renderLog()
}

const savedUser=sessionStorage.getItem('ek_user')
if(savedUser){currentUser=savedUser;document.getElementById('login-screen').style.display='none';document.getElementById('app').style.display='flex';document.getElementById('h-username').textContent=savedUser;bootApp()}
</script>
</body>
