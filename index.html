<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Earthkeeper</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{
  --gold:#C9A84C;--gold-l:#E8D5A0;--gold-p:#FAF6EC;
  --sage:#6B7B5E;--ink:#1C1C1C;--soft:#8A8A8A;
  --cream:#F8F4EE;--cream-d:#EDE8DF;--white:#fff;
  --red:#C44B4B;--blue:#3D6FAF;--violet:#7B5EA7;
  --omega:#7B3FB5;--jewel:#C44B4B;--mg:#1A56B0;
  --bd:rgba(201,168,76,.2);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Jost',sans-serif;background:var(--cream);color:var(--ink);height:100vh;display:flex;flex-direction:column;overflow:hidden;-webkit-tap-highlight-color:transparent}
#login-screen{position:fixed;inset:0;background:var(--ink);display:flex;align-items:center;justify-content:center;z-index:9999}
.login-box{background:var(--cream);border-radius:8px;padding:40px 44px;width:340px;text-align:center}
.login-logo{font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:300;letter-spacing:.12em;color:var(--ink);margin-bottom:6px}
.login-logo em{color:var(--gold);font-style:italic}
.login-sub{font-size:13px;color:var(--soft);letter-spacing:.1em;text-transform:uppercase;margin-bottom:30px}
.login-field{margin-bottom:14px;text-align:left}
.login-field label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--soft);display:block;margin-bottom:6px}
.login-field input{width:100%;padding:11px 14px;border:1px solid var(--cream-d);border-radius:4px;font-family:'Jost',sans-serif;font-size:15px;background:var(--white);outline:none;color:var(--ink)}
.login-field input:focus{border-color:var(--gold)}
.login-btn{width:100%;padding:13px;background:var(--ink);color:var(--gold-l);border:none;border-radius:4px;font-family:'Jost',sans-serif;font-size:13px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;margin-top:8px;transition:background .2s}
.login-btn:hover{background:#2a2a2a}
.login-err{font-size:12px;color:var(--jewel);margin-top:12px;min-height:18px}
#app{display:none;flex-direction:column;height:100vh}
header{background:var(--ink);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:68px;flex-shrink:0;gap:20px}
.logo{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;letter-spacing:.1em;color:var(--gold-l)}
.logo em{color:var(--gold);font-style:italic}
.huser{font-size:15px;color:var(--soft);display:flex;align-items:center;gap:12px}
.huser strong{color:var(--gold-l);font-size:16px}
.huser button{background:none;border:1px solid rgba(201,168,76,.25);color:var(--soft);padding:5px 12px;font-family:'Jost',sans-serif;font-size:13px;cursor:pointer;border-radius:4px}
.hstats{display:flex;gap:28px;font-size:14px;letter-spacing:.06em;color:var(--soft);text-transform:uppercase}
.hstats strong{color:var(--gold);font-size:22px;display:block;letter-spacing:0}
.hbtn{background:none;border:1px solid rgba(201,168,76,.3);color:var(--gold-l);padding:8px 18px;font-family:'Jost',sans-serif;font-size:14px;letter-spacing:.06em;cursor:pointer;border-radius:4px;text-transform:uppercase;transition:all .2s}
.hbtn:hover{background:rgba(201,168,76,.12);border-color:var(--gold)}
.body{display:flex;flex:1;overflow:hidden}
.sidebar{width:33.333%;flex-shrink:0;background:var(--white);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden;transition:width .3s,opacity .3s}
.sidebar.collapsed{width:0;opacity:0;pointer-events:none}
.tabs{display:flex;border-bottom:3px solid var(--cream-d);flex-shrink:0;background:var(--cream)}
.tab{flex:1;padding:18px 8px;font-family:'Jost',sans-serif;font-size:14px;text-transform:uppercase;letter-spacing:.08em;background:none;border:none;cursor:pointer;color:var(--soft);transition:all .2s;border-bottom:4px solid transparent;margin-bottom:-3px}
.tab.on{background:var(--white);color:var(--ink);font-weight:500;border-bottom-color:var(--gold);font-size:15px}
.panel{display:none;flex-direction:column;flex:1;overflow:hidden;min-height:0}
.panel.on{display:flex}
.frow{padding:16px 22px;border-bottom:1px solid var(--cream-d);flex-shrink:0}
.frow-label{font-size:13px;text-transform:uppercase;letter-spacing:.1em;color:var(--soft);margin-bottom:10px;font-weight:500}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{display:flex;align-items:center;gap:6px;padding:7px 16px;border-radius:24px;font-size:14px;cursor:pointer;border:2px solid;transition:all .15s;font-family:'Jost',sans-serif;user-select:none}
.chip-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.chip.hospital{border-color:var(--red);color:var(--red)}.chip.hospital.on{background:var(--red);color:#fff}
.chip.school{border-color:var(--blue);color:var(--blue)}.chip.school.on{background:var(--blue);color:#fff}
.chip.university{border-color:var(--violet);color:var(--violet)}.chip.university.on{background:var(--violet);color:#fff}
.chip.show-all{border-color:var(--soft);color:var(--soft)}.chip.show-all.on{background:var(--soft);color:#fff}
.chip.show-cleared{border-color:var(--gold);color:var(--gold)}.chip.show-cleared.on{background:var(--gold);color:var(--ink)}
.chip.show-omega{border-color:var(--omega);color:var(--omega)}.chip.show-omega.on{background:var(--omega);color:#fff}
.chip.show-jewel{border-color:var(--jewel);color:var(--jewel)}.chip.show-jewel.on{background:var(--jewel);color:#fff}
.chip.show-mg{border-color:var(--mg);color:var(--mg)}.chip.show-mg.on{background:var(--mg);color:#fff}
.rsel{padding:12px 22px;border-bottom:1px solid var(--cream-d);flex-shrink:0}
.rsel select{width:100%;padding:11px 14px;border:1px solid var(--cream-d);border-radius:6px;font-family:'Jost',sans-serif;font-size:16px;background:var(--cream);outline:none;cursor:pointer}
.srow{padding:12px 22px;border-bottom:1px solid var(--cream-d);flex-shrink:0}
.sinput{width:100%;padding:11px 14px;border:1.5px solid var(--cream-d);border-radius:6px;font-family:'Jost',sans-serif;font-size:16px;outline:none;background:var(--white)}
.sinput:focus{border-color:var(--gold)}
.llist{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;min-height:0}
.llist::-webkit-scrollbar{width:4px}
.llist::-webkit-scrollbar-thumb{background:var(--cream-d)}
.litem{padding:14px 22px;cursor:pointer;border-bottom:1px solid var(--cream-d);transition:background .12s;display:flex;align-items:flex-start;gap:13px}
.litem:hover{background:var(--cream)}
.litem.sel{background:var(--gold-p);border-left:5px solid var(--gold);padding-left:17px}
.ldot{width:14px;height:14px;border-radius:50%;flex-shrink:0;margin-top:4px;border:2px solid transparent}
.linfo{flex:1;min-width:0}
.lname{font-size:17px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.litem.done .lname{text-decoration:line-through;opacity:.5}
.lmeta{font-size:14px;color:var(--soft);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lbadge{font-size:12px;padding:3px 10px;border-radius:12px;flex-shrink:0;align-self:center;border:1.5px solid;white-space:nowrap;font-weight:500}
.detail{flex-shrink:0;border-top:2px solid var(--bd);background:var(--white);display:none;flex-direction:column;max-height:50%}
.detail.on{display:flex}
.detail-head{padding:18px 22px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.detail-head-left{flex:1;min-width:0}
.detail-head-right{display:flex;flex-direction:row;align-items:center;gap:10px;flex-shrink:0}
.detail-close{background:none;border:none;font-size:24px;color:var(--soft);cursor:pointer;line-height:1;padding:0}
.detail-close:hover{color:var(--ink)}
.gmaps-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:7px;background:var(--white);border:1.5px solid var(--cream-d);text-decoration:none;cursor:pointer;transition:all .15s;font-family:'Jost',sans-serif;font-size:13px;font-weight:500;color:#4285F4;white-space:nowrap}
.gmaps-btn:hover{border-color:#4285F4;background:#f0f4ff}
.gmaps-btn svg{width:15px;height:15px;flex-shrink:0}
.detail-type{font-size:12px;text-transform:uppercase;letter-spacing:.1em;font-weight:500;margin-bottom:4px}
.detail-type.hospital{color:var(--red)}.detail-type.school{color:var(--blue)}.detail-type.university{color:var(--violet)}
.detail-name{font-family:'Cormorant Garamond',serif;font-size:26px;line-height:1.3;color:var(--ink)}
.detail-addr{font-size:14px;color:var(--soft);margin-top:4px}
.detail-body{padding:14px 22px 20px;overflow-y:auto}
.detail-cleared{font-size:15px;padding:10px 14px;border-radius:6px;margin-bottom:12px;line-height:1.5}
.tool-label{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--soft);margin-bottom:8px}
.tool-btns{display:flex;gap:10px;margin-bottom:12px}
.tool-btn{flex:1;padding:12px 8px;border:2px solid;border-radius:6px;font-family:'Jost',sans-serif;font-size:15px;cursor:pointer;background:none;transition:all .15s;letter-spacing:.04em;font-weight:500}
.tool-btn.omega{border-color:var(--omega);color:var(--omega)}.tool-btn.omega.sel{background:var(--omega);color:#fff}
.tool-btn.jewel{border-color:var(--jewel);color:var(--jewel)}.tool-btn.jewel.sel{background:var(--jewel);color:#fff}
.tool-btn.mg{border-color:var(--mg);color:var(--mg)}.tool-btn.mg.sel{background:var(--mg);color:#fff}
.btn-mark{display:block;width:100%;padding:14px;background:var(--ink);color:var(--cream);border:none;border-radius:6px;font-family:'Jost',sans-serif;font-size:15px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:background .2s}
.btn-mark:hover{background:var(--sage)}
.btn-unmark{display:block;width:100%;padding:11px;margin-top:10px;background:none;border:2px solid var(--cream-d);border-radius:6px;font-family:'Jost',sans-serif;font-size:14px;color:var(--soft);cursor:pointer;text-transform:uppercase;letter-spacing:.06em}
.btn-unmark:hover{border-color:var(--jewel);color:var(--jewel)}
.log-filter{padding:12px 22px;border-bottom:1px solid var(--cream-d);flex-shrink:0;display:flex;gap:10px;align-items:center}
.log-filter label{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--soft);white-space:nowrap}
.log-date-input{flex:1;padding:7px 10px;border:1px solid var(--cream-d);border-radius:5px;font-family:'Jost',sans-serif;font-size:13px;outline:none;background:var(--cream);color:var(--ink)}
.log-date-input:focus{border-color:var(--gold)}
.log-clear-btn{background:none;border:1px solid var(--cream-d);border-radius:5px;padding:6px 10px;font-family:'Jost',sans-serif;font-size:12px;color:var(--soft);cursor:pointer;white-space:nowrap}
.log-clear-btn:hover{border-color:var(--jewel);color:var(--jewel)}
#map{flex:1}
.mwrap{position:relative;flex:1;display:flex;flex-direction:column}
.mload{position:absolute;inset:0;background:var(--cream);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:500;gap:18px}
.mload h2{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:34px}
.dots{display:flex;gap:8px}
.dots span{width:10px;height:10px;border-radius:50%;background:var(--gold);animation:pulse 1.2s ease-in-out infinite}
.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
.msub{font-size:15px;color:var(--soft);text-align:center;max-width:320px}
.tog{position:absolute;top:50%;left:0;transform:translateY(-50%);z-index:1000;background:#fff;border:1px solid var(--cream-d);border-left:none;border-radius:0 6px 6px 0;width:24px;height:56px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--soft);font-size:12px}
.tog:hover{background:var(--cream)}
.map-overlays{position:absolute;top:16px;right:16px;z-index:400;display:flex;flex-direction:column;gap:10px;align-items:flex-end}
.progress{background:#ffffffee;border:1px solid var(--cream-d);border-radius:6px;padding:14px 20px;min-width:220px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.prog-title{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--soft);margin-bottom:10px}
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.prog-label{font-size:14px;width:80px;flex-shrink:0}
.prog-track{flex:1;height:5px;background:var(--cream-d);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .4s}
.prog-count{font-size:13px;color:var(--soft);min-width:36px;text-align:right}
.legend{background:#ffffffee;border:1px solid var(--cream-d);border-radius:6px;padding:14px 18px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.leg-title{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--soft);margin-bottom:9px}
.leg-item{display:flex;align-items:center;gap:9px;margin-bottom:7px;font-size:14px}
.leg-dot{width:13px;height:13px;border-radius:50%}
.locate-btn{position:absolute;bottom:24px;left:16px;z-index:410;background:#ffffffee;border:1px solid var(--cream-d);border-radius:8px;padding:9px 14px;display:inline-flex;align-items:center;gap:7px;cursor:pointer;font-family:'Jost',sans-serif;font-size:14px;font-weight:500;color:var(--ink);box-shadow:0 2px 8px rgba(0,0,0,.12);transition:all .15s}
.locate-btn:hover{background:#fff;border-color:var(--gold)}
.locate-btn span{font-size:18px;line-height:1}
.empty{padding:28px;text-align:center;font-size:15px;color:var(--soft);line-height:1.8}
.saving{position:fixed;bottom:24px;right:24px;background:var(--ink);color:var(--gold-l);padding:12px 18px;border-radius:5px;font-size:14px;z-index:9999;transition:opacity .4s;pointer-events:none}
#mobile-detail{display:none}

@media(max-width:700px){
  .leaflet-control-zoom{display:none!important}
  header{height:50px;padding:0 14px}
  .logo{font-size:20px}
  .hstats{display:none}
  .huser strong{font-size:12px}
  .hbtn{font-size:11px;padding:5px 10px}
  #app{flex-direction:column}
  .body{flex-direction:column;flex:1;overflow:hidden}
  .mwrap{flex:1;min-height:0;position:relative}
  .sidebar{width:100%!important;opacity:1!important;flex-shrink:0;border-right:none;border-top:2px solid var(--bd);height:auto;overflow:visible}
  .sidebar.collapsed{height:44px;overflow:hidden}
  /* llist hidden by default on mobile; shown only when search has text */
  .llist{display:none!important;flex:none!important}
  .llist.active{display:block!important;max-height:40vh;overflow-y:auto!important}
  .sidebar .detail{display:none!important}
  .tabs{background:var(--ink)}
  .tab{color:rgba(255,255,255,.5);font-size:11px;padding:11px 4px;border-bottom-color:transparent;border-bottom-width:3px;margin-bottom:-3px}
  .tab.on{background:var(--white);color:var(--ink);border-bottom-color:var(--gold);font-size:12px}
  .frow{padding:7px 12px}
  .frow-label{font-size:10px;margin-bottom:5px}
  .chip{font-size:11px;padding:4px 9px;border-width:1.5px;gap:4px}
  .chip-dot{width:6px;height:6px}
  .rsel{padding:5px 12px}
  .rsel select{font-size:13px;padding:6px 10px}
  .srow{padding:5px 12px}
  .sinput{font-size:13px;padding:6px 10px;border-width:1px}
  .log-filter{padding:7px 12px;gap:7px}
  .log-filter label{font-size:10px}
  .log-date-input{font-size:12px;padding:5px 8px}
  .log-clear-btn{font-size:11px;padding:5px 8px}
  .tog{display:none}
  .map-overlays{top:8px;right:8px;gap:6px}
  .progress{min-width:140px;padding:7px 11px}
  .prog-title{font-size:9px;margin-bottom:5px}
  .prog-row{gap:6px;margin-bottom:4px}
  .prog-label{font-size:10px;width:52px}
  .prog-track{height:3px}
  .prog-count{font-size:9px;min-width:28px}
  .legend{padding:6px 9px}
  .leg-title{font-size:9px;margin-bottom:4px}
  .leg-item{font-size:10px;gap:5px;margin-bottom:3px}
  .leg-dot{width:7px;height:7px}
  .locate-btn{position:fixed!important;bottom:12px;left:12px;z-index:820;padding:7px 11px;font-size:12px;gap:5px;transition:bottom .25s ease}
  .locate-btn span{font-size:16px}
  .saving{bottom:12px;right:12px;font-size:11px;padding:8px 12px}
  #mobile-detail{display:none;position:fixed;bottom:0;left:0;right:0;max-height:50vh;overflow-y:auto;border-radius:14px 14px 0 0;box-shadow:0 -4px 24px rgba(0,0,0,.2);z-index:810;background:var(--white);-webkit-overflow-scrolling:touch;flex-direction:column}
  #mobile-detail.on{display:flex}
  #mobile-detail .detail-head{padding:12px 14px 0}
  #mobile-detail .detail-head-right{gap:8px}
  #mobile-detail .detail-close{font-size:18px}
  #mobile-detail .gmaps-btn{font-size:12px;padding:5px 9px}
  #mobile-detail .gmaps-btn svg{width:13px;height:13px}
  #mobile-detail .detail-type{font-size:10px}
  #mobile-detail .detail-name{font-size:17px}
  #mobile-detail .detail-addr{font-size:11px}
  #mobile-detail .detail-body{padding:10px 14px 16px}
  #mobile-detail .detail-cleared{font-size:12px;padding:7px 10px;margin-bottom:8px}
  #mobile-detail .tool-label{font-size:11px;margin-bottom:6px}
  #mobile-detail .tool-btns{gap:7px;margin-bottom:8px}
  #mobile-detail .tool-btn{padding:9px 5px;font-size:13px;border-width:1.5px}
  #mobile-detail .btn-mark{padding:10px;font-size:13px}
  #mobile-detail .btn-unmark{padding:8px;font-size:12px;margin-top:7px;border-width:1.5px}
}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">Earth<em>keeper</em></div>
    <div class="login-sub">Energy clearing tracker</div>
    <form autocomplete="on" onsubmit="doLogin(event)">
      <div class="login-field">
        <label for="login-name">Your full name</label>
        <input type="text" id="login-name" name="username" placeholder="e.g. Anthony Gorman" autocomplete="username">
      </div>
      <div class="login-field">
        <label for="login-pw">Password</label>
        <input type="password" id="login-pw" name="password" placeholder="••••••" autocomplete="current-password">
      </div>
      <button type="submit" class="login-btn">Enter</button>
    </form>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<div id="app">
<header>
  <div class="logo">Earth<em>keeper</em></div>
  <div class="hstats">
    <div><strong id="s-total">—</strong>locations</div>
    <div><strong id="s-cleared">0</strong>cleared</div>
    <div><strong id="s-pct">0%</strong>done</div>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <div class="huser"><strong id="h-username"></strong><button onclick="logout()">Sign out</button></div>
    <button class="hbtn" onclick="toggleSidebar()">☰ Panel</button>
  </div>
</header>
<div class="body">
  <div class="sidebar" id="sidebar">
    <div class="tabs">
      <button class="tab on" onclick="switchTab('locs',this)">Locations</button>
      <button class="tab"    onclick="switchTab('log',this)">Log</button>
    </div>
    <div class="panel on" id="tab-locs">
      <div class="frow">
        <div class="frow-label">Places</div>
        <div class="chips">
          <div class="chip hospital on" onclick="togglePlace('hospital',this)"><span class="chip-dot" style="background:var(--red)"></span>Hospitals</div>
          <div class="chip school on"   onclick="togglePlace('school',this)"><span class="chip-dot" style="background:var(--blue)"></span>Schools</div>
          <div class="chip university on" onclick="togglePlace('university',this)"><span class="chip-dot" style="background:var(--violet)"></span>Unis</div>
        </div>
      </div>
      <div class="frow">
        <div class="frow-label">Show</div>
        <div class="chips">
          <div class="chip show-all on" id="chip-all"     onclick="setShow('all',this)">All</div>
          <div class="chip show-cleared" id="chip-cleared" onclick="setShow('cleared',this)"><span class="chip-dot" style="background:var(--gold)"></span>Cleared</div>
          <div class="chip show-omega"   id="chip-omega"   onclick="setShow('omega',this)"><span class="chip-dot" style="background:var(--omega)"></span>Omega</div>
          <div class="chip show-jewel"   id="chip-jewel"   onclick="setShow('jewel',this)"><span class="chip-dot" style="background:var(--jewel)"></span>Jewel</div>

<div id="mobile-detail">
  <div class="detail-head">
    <div class="detail-head-left">
      <div class="detail-type" id="md-type"></div>
      <div class="detail-name" id="md-name"></div>
      <div class="detail-addr" id="md-addr"></div>
    </div>
    <div class="detail-head-right">
      <a class="gmaps-btn" id="md-gmaps" href="#" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z" fill="#4285F4"/></svg>
        Go To
      </a>
      <button class="detail-close" onclick="closeMobileDetail()">✕</button>
    </div>
  </div>
  <div class="detail-body" id="md-body"></div>
</div>

<div class="saving" id="saving" style="opacity:0"></div>

<style>
@keyframes markerGlow{
  0%  {box-shadow:0 0 0 0   rgba(201,168,76,.9),0 2px 6px rgba(0,0,0,.28)}
  50% {box-shadow:0 0 0 14px rgba(201,168,76,0),0 2px 6px rgba(0,0,0,.28)}
  100%{box-shadow:0 0 0 0   rgba(201,168,76,0),0 2px 6px rgba(0,0,0,.28)}
}
.marker-selected div{animation:markerGlow .8s ease-out infinite!important;border-width:3px!important}
@keyframes clearedGlow{
  0%,100%{filter:drop-shadow(0 0 3px rgba(201,168,76,.7))}
  50%{filter:drop-shadow(0 0 7px rgba(201,168,76,1))}
}
</style>

<script>
const GITHUB_TOKEN  = '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'
const PASSWORD_HASH = '74e6fbb572af72246abf610d8e268ae53e6599972c571117503dc4537b982b69'
const REPO_OWNER='Londrovski', REPO_NAME='earthkeeper', DATA_BRANCH='main'
const API_BASE=`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/data`

let locations=[], progress={}, progressSha=null, markers={}, selectedId=null, map
let placesFilter={hospital:true,school:true,university:true}, showFilter='all', currentTool='omega', currentUser=null
let locationMarker=null, currentMobileLoc=null

const GH_HEADERS={Authorization:`token ${GITHUB_TOKEN}`,Accept:'application/vnd.github.v3+json'}
function toolColor(t){return t==='omega'?'#7B3FB5':t==='jewel'?'#C44B4B':t==='mg'?'#1A56B0':'#C9A84C'}
const TOOLS=['omega','jewel','mg'], TOOL_NAMES={omega:'Omega',jewel:'Jewel',mg:'MG'}

let saveQueued=false
function queueSave(){saveQueued=true}
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='hidden'&&saveQueued){saveProgress();saveQueued=false}})
window.addEventListener('pagehide',()=>{if(saveQueued)saveProgress()})

async function doLogin(e){
  e.preventDefault()
  const name=document.getElementById('login-name').value.trim(), pw=document.getElementById('login-pw').value, err=document.getElementById('login-err')
  if(!name){err.textContent='Please enter your name';return}
  if(!pw){err.textContent='Please enter the password';return}
  err.textContent='Checking…'
  const hash=await sha256(pw)
  if(hash!==PASSWORD_HASH){err.textContent='Incorrect password';document.getElementById('login-pw').value='';return}
  currentUser=name; sessionStorage.setItem('ek_user',name)
  document.getElementById('login-screen').style.display='none'
  document.getElementById('app').style.display='flex'
  document.getElementById('h-username').textContent=name
  err.textContent=''; bootApp()
}
async function sha256(str){const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('')}
function logout(){sessionStorage.removeItem('ek_user');currentUser=null;document.getElementById('login-name').value='';document.getElementById('login-pw').value='';document.getElementById('login-screen').style.display='flex';document.getElementById('app').style.display='none'}

function isMobile(){return window.innerWidth<=700}

function updateLocateBtnPosition(){
  if(!isMobile())return
  const btn=document.getElementById('locate-btn')
  const panel=document.getElementById('mobile-detail')
  const panelH=panel.classList.contains('on')?(panel.offsetHeight||0):0
  btn.style.bottom=(12+panelH+(panelH>0?10:0))+'px'
}

function panToVisible(lat,lng,zoom){
  if(!isMobile()){
    if(zoom) map.setView([lat,lng],zoom)
    else map.panTo([lat,lng])
    return
  }
  requestAnimationFrame(()=>{
    const panel=document.getElementById('mobile-detail')
    const detailH=panel.classList.contains('on')?(panel.offsetHeight||0):0
    const offset=Math.round(detailH/2)
    if(zoom) map.setView([lat,lng],zoom,{animate:false})
    else map.panTo([lat,lng],{animate:false})
    if(offset>0) map.panBy([0,offset],{animate:true,duration:0.3})
  })
}

function initMap(){
  map=L.map('map',{tap:false,zoomControl:true}).setView([51.5,-0.1],10)
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap contributors © CARTO',subdomains:'abcd',maxZoom:19}).addTo(map)
}

function makeIcon(type,cleared,tool,selected){
  const typeColor=type==='hospital'?'#C44B4B':type==='school'?'#3D6FAF':'#7B5EA7'
  const tc=toolColor(tool)
  const fill=cleared?'#C9A84C':typeColor, border=cleared?tc:'#ffffff', borderW=cleared?3:2
  const sz=isMobile()?18:22
  const sparkle=cleared?'animation:clearedGlow 1.8s ease-in-out infinite;':''
  return L.divIcon({
    html:`<div style="width:${sz}px;height:${sz}px;border-radius:50% 50% 50% 0;background:${fill};transform:rotate(-45deg);border:${borderW}px solid ${border};box-shadow:0 2px 6px rgba(0,0,0,.3);${sparkle}"></div>`,
    iconSize:[sz,sz],iconAnchor:[sz/2,sz],className:selected?'marker-selected':''
  })
}

function locVisible(loc){
  if(!placesFilter[loc.type])return false
  const p=progress[loc.id]
  if(showFilter==='all')return true
  if(showFilter==='cleared')return!!p
  if(showFilter==='omega')return p?.tool==='omega'
  if(showFilter==='jewel')return p?.tool==='jewel'
  if(showFilter==='mg')return p?.tool==='mg'
  return true
}

function renderMarkers(){
  Object.values(markers).forEach(m=>map.removeLayer(m));markers={}
  for(const loc of locations){
    if(!loc.lat||!loc.lng||!locVisible(loc))continue
    const p=progress[loc.id]
    const m=L.marker([loc.lat,loc.lng],{icon:makeIcon(loc.type,!!p,p?.tool,loc.id===selectedId)}).addTo(map)
    m.on('click',()=>selectLoc(loc.id)); markers[loc.id]=m
  }
}

function setSelectedMarker(id){
  if(selectedId&&markers[selectedId]){const old=locations.find(l=>l.id===selectedId);if(old){const p=progress[old.id];markers[selectedId].setIcon(makeIcon(old.type,!!p,p?.tool,false))}}
  if(id&&markers[id]){const loc=locations.find(l=>l.id===id);if(loc){const p=progress[loc.id];markers[id].setIcon(makeIcon(loc.type,!!p,p?.tool,true));markers[id].setZIndexOffset(1000)}}
}

function locateMe(){
  if(!navigator.geolocation){alert('Geolocation not supported');return}
  navigator.geolocation.getCurrentPosition(pos=>{
    const{latitude:lat,longitude:lng}=pos.coords
    if(locationMarker)map.removeLayer(locationMarker)
    locationMarker=L.marker([lat,lng],{
      icon:L.divIcon({html:`<div style="width:16px;height:16px;border-radius:50%;background:#4285F4;border:3px solid white;box-shadow:0 0 0 3px rgba(66,133,244,.3)"></div>`,iconSize:[16,16],iconAnchor:[8,8],className:''}),
      zIndexOffset:2000
    }).addTo(map)
    panToVisible(lat,lng,14)
  },err=>{alert(err.code===1?'Location permission denied':'Could not get location')},{enableHighAccuracy:true,timeout:10000})
}

async function ghGet(path){
  const res=await fetch(`${API_BASE}/${path}`,{headers:GH_HEADERS})
  if(!res.ok) throw new Error(`GitHub ${res.status}`)
  const meta=await res.json()
  return JSON.parse(atob(meta.content.replace(/\n/g,'')))
}

async function ghGetOptional(path){
  try{ return await ghGet(path) }
  catch(e){ return [] }
}

async function loadRegion(region){
  if(!region)return
  closeMobileDetail(); closeDetail()
  setMsg(`Loading ${region}…`); document.getElementById('mload').style.display='flex'
  try{
    const [hospitals, schools, universities] = await Promise.all([
      ghGetOptional(`hospitals-${region}.json`),
      ghGetOptional(`schools-${region}.json`),
      ghGetOptional(`universities-${region}.json`)
    ])
    locations = [...hospitals, ...schools, ...universities]
    hideLoader(); renderMarkers(); renderList(); updateStats()
    const pts=locations.filter(l=>l.lat&&l.lng)
    if(pts.length){
      const lats=pts.map(l=>l.lat), lngs=pts.map(l=>l.lng)
      map.flyToBounds([[Math.min(...lats),Math.min(...lngs)],[Math.max(...lats),Math.max(...lngs)]],{padding:[40,40],maxZoom:12,duration:1})
    } else {
      setMsg(`No data for "${region}" yet`); setTimeout(hideLoader,3000)
    }
  }catch(e){
    setMsg(`Error loading ${region}`); setTimeout(hideLoader,3000); locations=[]; renderList()
  }
}

async function loadProgress(){
  try{const res=await fetch(`${API_BASE}/progress.json`,{headers:GH_HEADERS});if(res.ok){const meta=await res.json();progressSha=meta.sha;progress=JSON.parse(atob(meta.content.replace(/\n/g,'')))}}
  catch(e){progress={}}
}

async function saveProgress(){
  showSaving('Saving…')
  try{
    const body={message:`${currentUser||'user'} — ${new Date().toISOString().slice(0,10)}`,content:btoa(unescape(encodeURIComponent(JSON.stringify(progress,null,2)))),branch:DATA_BRANCH}
    if(progressSha)body.sha=progressSha
    const res=await fetch(`${API_BASE}/progress.json`,{method:'PUT',headers:{...GH_HEADERS,'Content-Type':'application/json'},body:JSON.stringify(body)})
    if(res.ok){progressSha=(await res.json()).content.sha;showSaving('✓ Saved')}
    else{const e=await res.json();showSaving('Save failed: '+e.message)}
  }catch(e){showSaving('Error saving')}
  setTimeout(()=>document.getElementById('saving').style.opacity='0',2500)
}
function showSaving(msg){const e=document.getElementById('saving');e.textContent=msg;e.style.opacity='1'}

function renderList(){
  const el=document.getElementById('llist')
  const q=document.getElementById('search').value.toLowerCase().trim()
  // On mobile: show the list only when there's a search query
  el.classList.toggle('active', !!q)
  if(!q){el.innerHTML='';return}
  const TC={hospital:'var(--red)',school:'var(--blue)',university:'var(--violet)'}
  const vis=locations.filter(l=>{
    if(!locVisible(l))return false
    return l.name.toLowerCase().includes(q)||(l.address||'').toLowerCase().includes(q)||(l.postcode||'').toLowerCase().includes(q)
  })
  if(!vis.length){el.innerHTML=`<div class="empty">No matches for "${q}"</div>`;return}
  el.innerHTML=vis.map(l=>{
    const p=progress[l.id]
    const dotBg=p?'#C9A84C':TC[l.type]
    const dotBorder=p?`border:2px solid ${toolColor(p.tool)}`:'border:2px solid transparent'
    const badge=p?`<div class="lbadge" style="color:${toolColor(p.tool)};border-color:${toolColor(p.tool)}66;background:${toolColor(p.tool)}14">${TOOL_NAMES[p.tool]||p.tool}</div>`:''
    return`<div class="litem ${p?'done':''} ${selectedId===l.id?'sel':''}" onclick="selectLoc('${l.id}')">
      <div class="ldot" style="background:${dotBg};${dotBorder}"></div>
      <div class="linfo"><div class="lname">${l.name}</div><div class="lmeta">${l.type} · ${l.address||l.postcode||''}</div></div>
      ${badge}
    </div>`
  }).join('')
}

function gmapsUrl(loc){
  const q=encodeURIComponent(`${loc.name} ${loc.address||loc.postcode||''}`)
  return loc.lat&&loc.lng?`https://www.google.com/maps/dir/?api=1&destination=${loc.lat},${loc.lng}`:`https://www.google.com/maps/search/?api=1&query=${q}`
}

function selectLoc(id){
  setSelectedMarker(id); selectedId=id
  const loc=locations.find(l=>l.id===id); if(!loc)return
  renderList()
  if(loc.lat&&loc.lng) panToVisible(loc.lat,loc.lng,null)
  if(isMobile()){
    // Clear search so list hides, then show detail panel
    document.getElementById('search').value=''
    renderList()
    renderMobileDetail(loc)
    if(document.getElementById('tab-log').classList.contains('on')){
      switchTab('locs',document.querySelectorAll('.tab')[0])
    }
  }else{
    renderDetail(loc)
  }
}

function renderDetail(loc){
  const p=progress[loc.id],cleared=!!p
  const typeEl=document.getElementById('d-type'); typeEl.textContent=loc.type; typeEl.className='detail-type '+loc.type
  document.getElementById('d-name').textContent=loc.name
  document.getElementById('d-addr').textContent=loc.address||loc.postcode||''
  document.getElementById('d-gmaps').href=gmapsUrl(loc)
  const body=document.getElementById('d-body')
  if(cleared){
    const d=new Date(p.date).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}),col=toolColor(p.tool),who=p.user?` · ${p.user}`:''
    body.innerHTML=`<div class="detail-cleared" style="background:${col}18;border:1px solid ${col}44;color:${col}">✦ Cleared with <strong>${TOOL_NAMES[p.tool]||p.tool}</strong> · ${d}${who}</div><button class="btn-unmark" onclick="unmarkCleared('${loc.id}')">↩ Mark as not cleared</button>`
  }else{
    const toolBtns=TOOLS.map(t=>`<button class="tool-btn ${t} ${currentTool===t?'sel':''}" id="tbtn-${t}" onclick="selectTool('${t}')">${TOOL_NAMES[t]}</button>`).join('')
    body.innerHTML=`<div class="tool-label">Energy tool</div><div class="tool-btns">${toolBtns}</div><button class="btn-mark" id="btn-mark-confirm" onclick="markCleared('${loc.id}')">Mark cleared with ${TOOL_NAMES[currentTool]} ✦</button>`
  }
  document.getElementById('detail').classList.add('on')
}
function closeDetail(){
  if(selectedId&&!isMobile()){setSelectedMarker(null);selectedId=null}
  document.getElementById('detail').classList.remove('on'); renderList()
}

function renderMobileDetail(loc){
  currentMobileLoc=loc
  const p=progress[loc.id],cleared=!!p
  const typeEl=document.getElementById('md-type'); typeEl.textContent=loc.type; typeEl.className='detail-type '+loc.type
  document.getElementById('md-name').textContent=loc.name
  document.getElementById('md-addr').textContent=loc.address||loc.postcode||''
  document.getElementById('md-gmaps').href=gmapsUrl(loc)
  const body=document.getElementById('md-body')
  if(cleared){
    const d=new Date(p.date).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}),col=toolColor(p.tool),who=p.user?` · ${p.user}`:''
    body.innerHTML=`<div class="detail-cleared" style="background:${col}18;border:1px solid ${col}44;color:${col}">✦ Cleared with <strong>${TOOL_NAMES[p.tool]||p.tool}</strong> · ${d}${who}</div><button class="btn-unmark" onclick="unmarkClearedMobile('${loc.id}')">↩ Mark as not cleared</button>`
  }else{
    const toolBtns=TOOLS.map(t=>`<button class="tool-btn ${t} ${currentTool===t?'sel':''}" id="md-tbtn-${t}" onclick="selectToolMobile('${t}')">${TOOL_NAMES[t]}</button>`).join('')
    body.innerHTML=`<div class="tool-label">Energy tool</div><div class="tool-btns">${toolBtns}</div><button class="btn-mark" id="md-btn-mark" onclick="markClearedMobile('${loc.id}')">Mark cleared with ${TOOL_NAMES[currentTool]} ✦</button>`
  }
  const panel=document.getElementById('mobile-detail')
  panel.classList.add('on')
  requestAnimationFrame(()=>{
    const detailH=panel.offsetHeight||0
    if(detailH>0&&loc.lat&&loc.lng){
      map.panTo([loc.lat,loc.lng],{animate:false})
      map.panBy([0,Math.round(detailH/2)],{animate:true,duration:0.25})
    }
    updateLocateBtnPosition()
  })
}

function closeMobileDetail(){
  if(selectedId){setSelectedMarker(null);selectedId=null}
  document.getElementById('mobile-detail').classList.remove('on')
  currentMobileLoc=null; renderList(); updateLocateBtnPosition()
}

function selectToolMobile(tool){
  currentTool=tool
  TOOLS.forEach(t=>document.getElementById(`md-tbtn-${t}`)?.classList.toggle('sel',t===tool))
  const btn=document.getElementById('md-btn-mark'); if(btn)btn.textContent=`Mark cleared with ${TOOL_NAMES[tool]} ✦`
}
async function markClearedMobile(id){
  const loc=locations.find(l=>l.id===id); if(!loc)return
  progress[id]={tool:currentTool,date:new Date().toISOString().slice(0,10),user:currentUser}
  if(markers[id])markers[id].setIcon(makeIcon(loc.type,true,currentTool,true))
  renderMobileDetail(loc); renderList(); updateStats(); renderLog()
  await saveProgress(); queueSave()
}
async function unmarkClearedMobile(id){
  const loc=locations.find(l=>l.id===id); if(!loc)return
  delete progress[id]
  if(markers[id])markers[id].setIcon(makeIcon(loc.type,false,null,id===selectedId))
  renderMobileDetail(loc); renderList(); updateStats(); renderLog()
  await saveProgress(); queueSave()
}

function selectTool(tool){
  currentTool=tool; TOOLS.forEach(t=>document.getElementById(`tbtn-${t}`)?.classList.toggle('sel',t===tool))
  const btn=document.getElementById('btn-mark-confirm'); if(btn)btn.textContent=`Mark cleared with ${TOOL_NAMES[tool]} ✦`
}
async function markCleared(id){
  const loc=locations.find(l=>l.id===id); if(!loc)return
  progress[id]={tool:currentTool,date:new Date().toISOString().slice(0,10),user:currentUser}
  if(markers[id])markers[id].setIcon(makeIcon(loc.type,true,currentTool,true))
  renderDetail(loc); renderList(); updateStats(); renderLog()
  await saveProgress(); queueSave()
}
async function unmarkCleared(id){
  const loc=locations.find(l=>l.id===id); if(!loc)return
  delete progress[id]
  if(markers[id])markers[id].setIcon(makeIcon(loc.type,false,null,id===selectedId))
  renderDetail(loc); renderList(); updateStats(); renderLog()
  await saveProgress(); queueSave()
}

function clearLogFilter(){
  document.getElementById('log-from').value=''
  document.getElementById('log-to').value=''
  renderLog()
}

function renderLog(){
  const el=document.getElementById('log-list')
  const fromVal=document.getElementById('log-from')?.value||''
  const toVal=document.getElementById('log-to')?.value||''
  let entries=Object.entries(progress)
    .map(([id,p])=>{const l=locations.find(x=>x.id===id);return{id,...p,name:l?.name||id,type:l?.type||''}})
    .sort((a,b)=>b.date.localeCompare(a.date))
  if(fromVal) entries=entries.filter(e=>e.date>=fromVal)
  if(toVal)   entries=entries.filter(e=>e.date<=toVal)
  if(!entries.length){el.innerHTML=`<div class="empty">${fromVal||toVal?'No clearings in that date range':'No clearings yet'}</div>`;return}
  el.innerHTML=entries.map(e=>{
    const col=toolColor(e.tool),d=new Date(e.date).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}),who=e.user?`<span style="color:var(--gold)">${e.user}</span> · `:''
    return`<div style="padding:14px 22px;border-bottom:1px solid var(--cream-d);cursor:pointer;transition:background .12s" onmouseover="this.style.background='var(--cream)'" onmouseout="this.style.background=''" onclick="openFromLog('${e.id}')">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
        <div style="width:11px;height:11px;border-radius:50%;background:var(--gold);border:2px solid ${col};flex-shrink:0"></div>
        <span style="font-size:16px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.name}</span>
      </div>
      <div style="font-size:13px;color:var(--soft);padding-left:21px">${who}${d} · ${TOOL_NAMES[e.tool]||e.tool} · ${e.type}</div>
    </div>`
  }).join('')
}

function openFromLog(id){
  switchTab('locs',document.querySelectorAll('.tab')[0])
  const loc=locations.find(l=>l.id===id)
  if(loc){selectLoc(id);return}
  const p=progress[id]; if(!p)return
  const col=toolColor(p.tool),d=new Date(p.date).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}),who=p.user?` · ${p.user}`:''
  const fallbackHtml=`<div class="detail-cleared" style="background:${col}18;border:1px solid ${col}44;color:${col}">✦ Cleared with <strong>${TOOL_NAMES[p.tool]||p.tool}</strong> · ${d}${who}</div><button class="btn-unmark" onclick="${isMobile()?'unmarkClearedMobile':'unmarkCleared'}('${id}')">↩ Mark as not cleared</button>`
  const gUrl=`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(id)}`
  if(isMobile()){
    document.getElementById('md-type').textContent=''; document.getElementById('md-type').className='detail-type'
    document.getElementById('md-name').textContent=p.name||id
    document.getElementById('md-addr').textContent='Load the region to see full details'
    document.getElementById('md-gmaps').href=gUrl
    document.getElementById('md-body').innerHTML=fallbackHtml
    document.getElementById('mobile-detail').classList.add('on')
    updateLocateBtnPosition()
  }else{
    document.getElementById('d-type').textContent=''; document.getElementById('d-type').className='detail-type'
    document.getElementById('d-name').textContent=p.name||id
    document.getElementById('d-addr').textContent='Load the region to see full details'
    document.getElementById('d-gmaps').href=gUrl
    document.getElementById('d-body').innerHTML=fallbackHtml
    document.getElementById('detail').classList.add('on')
  }
}

function updateStats(){
  const total=locations.length,cleared=Object.keys(progress).filter(id=>locations.find(l=>l.id===id)).length,pct=total?Math.round(cleared/total*100):0
  document.getElementById('s-total').textContent=total.toLocaleString(); document.getElementById('s-cleared').textContent=cleared; document.getElementById('s-pct').textContent=pct+'%'
  for(const[type,pgId,pgTxt]of[['hospital','pg-h','pg-ht'],['school','pg-s','pg-st'],['university','pg-u','pg-ut']]){
    const tot=locations.filter(l=>l.type===type).length,cl=locations.filter(l=>l.type===type&&progress[l.id]).length
    document.getElementById(pgId).style.width=(tot?Math.round(cl/tot*100):0)+'%'; document.getElementById(pgTxt).textContent=`${cl}/${tot}`
  }
}

function togglePlace(type,el){placesFilter[type]=!placesFilter[type];el.classList.toggle('on',placesFilter[type]);renderMarkers();renderList()}
function setShow(mode,el){showFilter=mode;document.querySelectorAll('.chip.show-all,.chip.show-cleared,.chip.show-omega,.chip.show-jewel,.chip.show-mg').forEach(c=>c.classList.remove('on'));el.classList.add('on');renderMarkers();renderList()}

let sbOpen=true
function toggleSidebar(){sbOpen=!sbOpen;document.getElementById('sidebar').classList.toggle('collapsed',!sbOpen);document.getElementById('tog').textContent=sbOpen?'‹':'›'}
function switchTab(name,btn){document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));btn.classList.add('on');document.getElementById('tab-'+name).classList.add('on')}

function setMsg(m){document.getElementById('mload-msg').textContent=m}
function hideLoader(){document.getElementById('mload').style.display='none'}

async function bootApp(){
  initMap(); setMsg('Loading progress…'); await loadProgress()
  document.getElementById('region-select').value='london'
  await loadRegion('london'); renderLog()
}

const savedUser=sessionStorage.getItem('ek_user')
if(savedUser){currentUser=savedUser;document.getElementById('login-screen').style.display='none';document.getElementById('app').style.display='flex';document.getElementById('h-username').textContent=savedUser;bootApp()}
</script>
